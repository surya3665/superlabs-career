name: career-server
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-career_db}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - career-network

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./config/.env:/usr/src/app/config/.env
      - ./uploads:/usr/src/app/uploads
      - ./app.js:/usr/src/app/app.js
      - ./router:/usr/src/app/router
      - ./controller:/usr/src/app/controller
      - ./config:/usr/src/app/config
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      DB_NAME: ${POSTGRES_DB:-career_db}
      DB_PORT: 5432
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6000:3000"
    networks:
      - career-network

networks:
  career-network:
    name: career-network
    driver: bridge

volumes:
  postgres_data:
